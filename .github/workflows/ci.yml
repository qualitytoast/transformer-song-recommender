name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gradient-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify autograd (numerical gradient check)
        run: python test_gradients.py
  docker-build:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t song-recommender .
    - name: Verify autograd inside the container
      run: docker run --rm song-recommender
